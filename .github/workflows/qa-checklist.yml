name: QA Checklist Generator

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key for Claude"
        required: true

jobs:
  generate-checklist:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    # Prevent duplicate runs
    concurrency:
      group: qa-checklist-pr-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Security Check - Validate User Access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR="${{ github.actor }}"
          echo "Validating access for user: $ACTOR"

          # Explicitly mask the token to prevent exposure in debug logs
          echo "::add-mask::${GH_TOKEN}"

          # Check if user is organization member
          MEMBERSHIP_STATUS=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/orgs/deriv-com/members/$ACTOR" \
            -w "%{http_code}" -o /dev/null)

          if [[ "$MEMBERSHIP_STATUS" == "204" ]]; then
            echo "✅ User $ACTOR is a verified organization member"
            exit 0
          fi

          # Check if user is repository collaborator
          COLLABORATOR_STATUS=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$ACTOR" \
            -w "%{http_code}" -o /dev/null)

          if [[ "$COLLABORATOR_STATUS" == "204" ]]; then
            echo "✅ User $ACTOR is a verified repository collaborator"
            exit 0
          fi

          echo "❌ Access denied for user: $ACTOR"
          echo "Only organization members and repository collaborators can trigger Claude actions."
          exit 1

      - name: Log Workflow Triggered
        id: trigger-info
        run: |
          WORKFLOW_START_TIME=$(date +%s)
          echo "start_time=$WORKFLOW_START_TIME" >> $GITHUB_OUTPUT
          echo "## QA Checklist Generator — Workflow Info" >> $GITHUB_STEP_SUMMARY
          echo "Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Actor: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: @${{ github.event.comment.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "PR Number: #${{ github.event.issue.number }}" >> $GITHUB_STEP_SUMMARY
          echo "Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY

          # Log workflow_triggered event
          EVENTS_FILE="/tmp/qa_events_${GITHUB_RUN_ID}.jsonl"
          PR_LINK="https://github.com/${{ github.repository }}/pull/${{ github.event.issue.number }}"
          jq -cn \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg triggered_by "${{ github.event.comment.user.login }}" \
            --arg pr_link "$PR_LINK" \
            '{
              agent: "QA Checklist Generator",
              event_type: "workflow_triggered",
              run_id: $run_id,
              trigger_type: "comment",
              timestamp: (now | todate),
              payload: {
                repository: $repo,
                actor: $actor,
                triggered_by: $triggered_by,
                pr_link: $pr_link,
                workflow_name: "qa-checklist"
              }
            }' >> "$EVENTS_FILE" 2>/dev/null || true

      - name: Get PR Details
        id: pr
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Explicitly mask the token to prevent exposure in debug logs
          echo "::add-mask::${GH_TOKEN}"

          PR_DATA=$(curl -s --max-time 30 \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")

          # Validate JSON response structure
          if ! echo "$PR_DATA" | jq -e '.head.ref' > /dev/null 2>&1; then
            echo "❌ Failed to fetch PR details. Response:"
            echo "$PR_DATA" | jq '.' || echo "$PR_DATA"
            exit 1
          fi

          # Extract values
          PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          PR_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')

          # Check for null values (deleted fork case)
          if [[ "$PR_REPO" == "null" || -z "$PR_REPO" ]]; then
            echo "❌ Cannot determine PR source repository (possibly deleted fork)"
            exit 1
          fi

          echo "ref=${PR_REF}" >> $GITHUB_OUTPUT
          echo "sha=${PR_SHA}" >> $GITHUB_OUTPUT
          echo "repo=${PR_REPO}" >> $GITHUB_OUTPUT

      - name: Validate PR Source
        run: |
          if [[ "${{ steps.pr.outputs.repo }}" != "${{ github.repository }}" ]]; then
            echo "❌ PRs from forks are not supported for security reasons"
            exit 1
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify git workspace
        run: |
          pwd
          git rev-parse --is-inside-work-tree
          git log -1 --oneline

      - name: Generate QA Checklist
        uses: anthropics/claude-code-action@8a1c4371755898f67cd97006ba7c97702d5fc4bf
        timeout-minutes: 60
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            TRIGGERED BY: @${{ github.event.comment.user.login }}

            You are a QA specialist. Generate a focused, actionable end-user testing checklist based on the actual changes in this PR.

            ## Critical Rules

            1. **ONLY test what changed** - Do not include generic tests unrelated to the PR
            2. **Be proportional** - Scale test count to match the scope of changes (1 test per distinct functionality change)
            3. **Avoid redundancy** - Combine related tests, don't repeat similar scenarios
            4. **Focus on impact** - Prioritize user-facing behavior and critical workflows
            5. **Skip irrelevant edge cases** - Only include edge cases directly related to modified code

            ## Step 1: Analyze PR Changes

            Read the git diff and identify:
            - Which files were modified (components, stores, utilities, etc.)
            - What functionality was added, changed, or fixed
            - Which features/pages use the modified code
            - Any configuration or dependency changes

            ## Step 2: Map Changes to User Impact

            For EACH modified file, determine:
            - Is this visible to end users?
            - What specific user actions are affected?
            - What workflows might break?

            **Skip testing:**
            - Code refactoring with no behavior change
            - Type definition updates
            - Internal utilities not affecting UI
            - Test file changes
            - Documentation updates

            ## Step 3: Generate Focused Checklist

            Create test items (proportional to changes) that:
            - Directly test the modified functionality (1 test per distinct change)
            - Include only relevant edge cases based on changes
            - Cover critical user workflows affected by the PR
            - Are specific and actionable (not vague)
            - Avoid redundant or overlapping tests

            **Format:**

            ```markdown
            ## 🧪 QA Checklist for PR #${{ github.event.issue.number }}

            **For:** @${{ github.event.comment.user.login }}
            **Changes:** [One sentence describing what changed]

            ### ✅ Core Functionality
            - [ ] [Specific test based on actual change]
            - [ ] [Another test directly related to modified code]

            ### 🔍 Edge Cases (if applicable)
            - [ ] [Edge case relevant to the changes]

            ---
            *Regenerate: comment `@checkmaite`*
            ```

            ## Scaling Guidelines

            - **Small PR (1-3 files, single feature):** 3-6 test items
            - **Medium PR (4-8 files, multiple related changes):** 8-15 test items
            - **Large PR (9+ files, multiple features):** 15-25 test items
            - **Always:** Group related tests, avoid redundancy, focus on changes only

            ## Examples

            **✅ GOOD - Focused on changes:**
            ```
            PR changes: Updated product price calculation to include tax

            Tests (3 items):
            - [ ] Add product to cart and verify price includes tax amount
            - [ ] Change quantity and verify tax recalculates correctly
            - [ ] Test with tax-exempt items (if applicable to changes)
            ```

            **❌ BAD - Generic, unrelated to changes:**
            ```
            Tests (5 items):
            - [ ] Test all cart functionality
            - [ ] Verify navigation works
            - [ ] Check responsive design
            - [ ] Test login/logout
            - [ ] Verify error messages display
            ```

            ## Quick Reference

            **If PR changes:**
            - Form validation → Test the specific validation rules modified
            - UI component → Test the visual/interaction changes
            - API integration → Test the affected data flow
            - Store/state → Test features using that state
            - Configuration → Test the configured feature only

            Now analyze the PR and generate a concise, relevant checklist.

      - name: Summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_START_TIME: ${{ steps.trigger-info.outputs.start_time }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | PR Comment |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Number | #${{ github.event.issue.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.event.comment.user.login }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $JOB_STATUS |" >> $GITHUB_STEP_SUMMARY

          # Compute duration
          END_TIME=$(date +%s)
          START_TIME="${WORKFLOW_START_TIME:-$END_TIME}"
          DURATION_SECONDS=$((END_TIME - START_TIME))

          # Log workflow_completed event
          EVENTS_FILE="/tmp/qa_events_${GITHUB_RUN_ID}.jsonl"
          STATUS_VAL=$([ "$JOB_STATUS" = "success" ] && echo "success" || echo "failed")
          CHECKLIST_BOOL=$([ "$JOB_STATUS" = "success" ] && echo "true" || echo "false")
          if [ "$JOB_STATUS" = "success" ]; then
            ERROR_JSON="null"
          else
            ERROR_JSON="\"Job failed with status: $JOB_STATUS\""
          fi
          # Ensure numeric values are valid for jq --argjson
          [[ ! "$DURATION_SECONDS" =~ ^[0-9]+$ ]] && DURATION_SECONDS=0
          jq -cn \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg repo "${{ github.repository }}" \
            --arg status "$STATUS_VAL" \
            --argjson duration "$DURATION_SECONDS" \
            --argjson checklist_generated "$CHECKLIST_BOOL" \
            --argjson changes_made "$CHECKLIST_BOOL" \
            --argjson error "$ERROR_JSON" \
            '{
              agent: "QA Checklist Generator",
              event_type: "workflow_completed",
              run_id: $run_id,
              trigger_type: "comment",
              timestamp: (now | todate),
              payload: {
                repository: $repo,
                status: $status,
                duration_seconds: $duration,
                checklist_generated: $checklist_generated,
                changes_made: $changes_made,
                error: $error
              }
            }' >> "$EVENTS_FILE" 2>/dev/null || true

          # Display accumulated event log
          if [ -f "$EVENTS_FILE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "## 📊 QA Checklist Generator — Event Log" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            EVENT_NUM=0
            while IFS= read -r EVENT_LINE; do
              EVENT_NUM=$((EVENT_NUM + 1))
              EVENT_TYPE=$(echo "$EVENT_LINE" | jq -r '.event_type // "unknown"')
              {
                echo "<details>"
                printf "<summary>📋 Event %d: <code>%s</code></summary>\n" "$EVENT_NUM" "$EVENT_TYPE"
                echo ""
                echo '```json'
                echo "$EVENT_LINE" | jq '.'
                echo '```'
                echo ""
                echo "</details>"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            done < "$EVENTS_FILE"
          fi

      - name: Prepare Event Log Artifact
        if: always()
        run: |
          EVENTS_FILE="/tmp/qa_events_${GITHUB_RUN_ID}.jsonl"
          ARTIFACT_DIR="/tmp/qa_artifact_${GITHUB_RUN_ID}"
          mkdir -p "$ARTIFACT_DIR"
          if [ -s "$EVENTS_FILE" ]; then
            jq -s '.' "$EVENTS_FILE" > "$ARTIFACT_DIR/qa-checklist-payload.json"
          else
            echo '[]' > "$ARTIFACT_DIR/qa-checklist-payload.json"
          fi
          rm -f "$EVENTS_FILE"

      - name: Upload QA Checklist Event Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-checklist-event-log-${{ github.run_id }}
          path: /tmp/qa_artifact_${{ github.run_id }}/qa-checklist-payload.json
          retention-days: 90
          if-no-files-found: warn
